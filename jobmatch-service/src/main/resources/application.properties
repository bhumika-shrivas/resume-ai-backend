spring.application.name=jobmatch-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
server.port=8087

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/resume_ai_jobmatch?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Feign Client
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000

# External Job APIs via RapidAPI
# LinkedIn Job Search API (fantastic-jobs): https://rapidapi.com/fantastic-jobs-fantastic-jobs-default/api/linkedin-job-search-api
linkedin.rapidapi.key=${RAPIDAPI_LINKEDIN_KEY}
# Naukri Jobs API: subscribe at https://rapidapi.com and search "Naukri Jobs"
naukri.rapidapi.key=${RAPIDAPI_NAUKRI_KEY}

eureka.instance.prefer-ip-address=true
