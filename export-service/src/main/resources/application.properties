spring.application.name=export-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
server.port=8086

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/resume_ai_export?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Storage Config (Local File System)
storage.root=C:/ResumeAI/exports
export.download.url=http://localhost:8086/api/v1/exports/download/

# Async Config
export.queue.name=resume-export-queue
export.exchange.name=resume-export-exchange
export.routing.key=resume-export-key

eureka.instance.prefer-ip-address=true
