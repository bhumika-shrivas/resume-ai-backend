server:
  port: 9090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods Access-Control-Allow-Headers, RETAIN_UNIQUE
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/auth/**
          filters:
            - Authentication
        - id: admin-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/admin/**
          filters:
            - Authentication
        - id: auth-oauth2
          uri: http://localhost:8081
          predicates:
            - Path=/oauth2/**,/login/oauth2/**
          filters:
            - Authentication
        - id: resume-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/resumes/**
          filters:
            - Authentication
        - id: section-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/sections/**
          filters:
            - Authentication
        - id: template-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/templates/**
          filters:
            - Authentication
        - id: ai-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - Authentication
        - id: export-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/exports/**
          filters:
            - Authentication
        - id: jobmatch-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/job-matches/**
          filters:
            - Authentication
        - id: notification-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - Authentication
        - id: subscription-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/subscription/**
          filters:
            - Authentication
        - id: payment-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - Authentication

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.http.server.reactive: DEBUG
    org.springframework.web.reactive: DEBUG
    reactor.ipc.netty: DEBUG