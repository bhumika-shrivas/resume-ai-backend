spring.application.name=notification-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
server.port=8088

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/resume_ai_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
# spring.data.redis.password=your-password-if-any
# spring.data.redis.database=0
# spring.data.redis.timeout=60000

# Mail Config (Mock)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=bhumikashrivas.work@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

eureka.instance.prefer-ip-address=true
